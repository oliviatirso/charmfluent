<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charmfluent</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/player/player.css">
  <link rel="stylesheet" href="/src/player/cam-widget.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060612; overflow: hidden; }
    #page-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <!-- Page content loads here — player floats above it -->
  <iframe id="page-frame" src="/pages/home.html"></iframe>

  <!-- Music Player Widget (persistent — never reloads) -->
  <div id="player-widget">
    <div class="wrap">

      <div class="sp" style="top:-18px;left:40px;--sd:3.2s;--sf:16px">✦</div>
      <div class="sp" style="top:-12px;right:180px;--sd:4.4s;--ss:1.1s;--sf:11px">✧</div>
      <div class="sp" style="bottom:-14px;right:160px;--sd:2.8s;--ss:.6s;--sf:13px">✦</div>

      <div class="ipod-h">
        <div class="side-vol">
          <div class="svb"></div>
          <div class="svb"></div>
        </div>

        <div class="screen-h">
          <!-- NOW PLAYING VIEW -->
          <div class="view-h active" id="v-np">
            <canvas id="ac" class="art-sq" width="142" height="142"></canvas>
            <div class="info-h">
              <div class="np-badge">♫ NOW PLAYING</div>
              <div class="np-title-h" id="npt">TELL ME WHAT YOU WANT</div>
              <div class="np-artist-h" id="npa">Sasha Keable ✦</div>
              <div class="eq-h">
                <div class="eq-b" id="eq0"></div>
                <div class="eq-b" id="eq1"></div>
                <div class="eq-b" id="eq2"></div>
                <div class="eq-b" id="eq3"></div>
              </div>
              <div class="prog-track-h" id="prog-track-h">
                <div class="prog-fill-h" id="pf"></div>
              </div>
              <div class="prog-times-h">
                <span id="te">0:00</span>
                <span id="td">0:00</span>
              </div>
            </div>
          </div>

          <!-- TRACK LIST VIEW -->
          <div class="view-h" id="v-tl">
            <div class="list-hdr-h">✦ TRACKS</div>
            <div class="list-scroll-h" id="tl"></div>
          </div>
        </div>

        <div class="wheel-wrap">
          <div class="wheel">
            <button class="wz wz-t" id="hb">MENU</button>
            <button class="wz wz-l" id="pb">
              <svg width="14" height="14" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button class="wz wz-r" id="nb">
              <svg width="14" height="14" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 3.9V8.1L8.5 12zM16 6h2v12h-2z"/></svg>
            </button>
            <button class="wz wz-b">
              <svg width="13" height="13" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            </button>
            <button class="wheel-center" id="ppb">
              <svg id="ppi" width="20" height="20" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/player/player.js"></script>

  <!-- Camera / Photo Widget (bottom-left) -->
  <div id="cam-widget">
    <div class="cam-wrap">

      <div class="cam-sp" style="top:-14px;left:80px;--sd:3.6s;--sf:13px">✦</div>
      <div class="cam-sp" style="top:-10px;right:90px;--sd:4.4s;--ss:1s;--sf:9px">✧</div>
      <div class="cam-sp" style="bottom:-10px;left:160px;--sd:2.9s;--ss:.5s;--sf:11px">✦</div>

      <!-- Camera body -->
      <div class="cam-body">

        <!-- Top strip -->
        <div class="cam-top">
          <div class="cam-viewfinder"></div>
          <div class="cam-model">DSC-W130 &nbsp;Super SteadyShot</div>
          <div class="cam-top-btns">
            <button class="cam-top-btn" id="cam-bb" title="Add photos">+</button>
            <button class="cam-top-btn" id="cam-hb" title="Grid view">⊞</button>
          </div>
        </div>

        <!-- Main area -->
        <div class="cam-main">

          <!-- Screen -->
          <div class="cam-screen-bezel">
            <div class="cam-screen" id="cam-screen">
              <!-- PHOTO VIEW -->
              <div class="cam-view active" id="v-cp">
                <canvas id="cam-canvas"></canvas>
                <img id="cam-photo" alt="">
                <div id="cam-upload-hint">
                  <div class="cu-icon">📷</div>
                  <div class="cu-lbl">CLICK TO ADD PHOTOS</div>
                </div>
                <!-- HUD -->
                <div class="cam-hud" id="cam-hud">
                  <div class="cam-hud-top">
                    <span class="hud-t">▶ PLAY</span>
                    <span class="hud-t" id="cam-count-label">1 / 1</span>
                  </div>
                  <div class="cam-hud-bot">
                    <span class="hud-t" id="cam-photo-name"></span>
                    <div class="cam-count-bar"><div class="cam-count-fill" id="cam-count-fill"></div></div>
                  </div>
                </div>
              </div>

              <!-- GRID VIEW -->
              <div class="cam-view" id="v-cg">
                <div class="cam-grid-inner">
                  <div class="cam-grid-hdr">✦ GALLERY</div>
                  <div class="cam-grid-scroll" id="cam-grid-scroll"></div>
                </div>
              </div>

              <!-- scanlines + vignette -->
              <div class="cam-scanlines"></div>
              <div class="cam-vignette"></div>
            </div>
          </div>

          <!-- Right controls -->
          <div class="cam-controls">

            <!-- MENU / HOME row -->
            <div class="cam-menu-row">
              <button class="cam-menu-btn" id="cam-hb2">MENU</button>
              <button class="cam-menu-btn" id="cam-home-btn">HOME</button>
            </div>

            <!-- D-pad -->
            <div class="cam-dpad">
              <div class="cam-dpad-ring">
                <button class="cdp cdp-t" id="cam-pb" title="Prev">▲</button>
                <button class="cdp cdp-b" id="cam-nb" title="Next">▼</button>
                <button class="cdp cdp-l" title="◀">◀</button>
                <button class="cdp cdp-r" title="▶">▶</button>
                <button class="cam-dpad-ok" id="cam-ppb">OK</button>
              </div>
            </div>

            <!-- Bottom icon buttons -->
            <div class="cam-icon-row">
              <button class="cam-icon-btn" id="cam-play-btn">▶</button>
            </div>

          </div>
        </div>

        <!-- Bottom strip -->
        <div class="cam-bottom">
          <span class="cam-brand">SONY</span>
        </div>

        <!-- Strap lug right -->
        <div class="cam-strap-lug"></div>
      </div>
    </div>
  </div>

  <input type="file" id="cam-file" accept="image/*" multiple>
  <script type="module" src="/src/player/cam-widget.js"></script>
</body>
</html>
